name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # GitHub-hosted runners ship full Xcode, so the HIServices/Icons.h
      # header is present — no VFS overlay (as make-app.sh needs locally)
      # is required to compile or run the test suite here.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run tests
        run: swift test
